<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<title>FivePrayer · Team Dashboard — Sign in</title>
<style>
  :root{ --bg:#f6f7f9; --card:#fff; --line:#e7e9ee; --ink:#1a1d23; --mut:#6b7480; --teal:#0f9488; --teal2:#14b8a6; --red:#e5484d; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",Roboto,sans-serif;color:var(--ink)}
  .card{width:340px;max-width:92vw;background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 12px 40px rgba(20,30,50,.08);padding:30px 26px;text-align:center}
  .logo{width:54px;height:54px;border-radius:15px;box-shadow:0 4px 14px rgba(15,148,136,.3)}
  h1{font-size:18px;margin:14px 0 2px;font-weight:640;letter-spacing:-.01em}
  .sub{color:var(--mut);font-size:13px;margin:0 0 22px}
  form{display:flex;flex-direction:column;gap:11px}
  input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font:inherit;font-size:14.5px;background:#fbfcfd;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(20,184,166,.14)}
  button{margin-top:4px;padding:12px;border:0;border-radius:11px;font:inherit;font-weight:600;font-size:14.5px;color:#fff;
    background:linear-gradient(180deg,#22c2b0,#0f9488);cursor:pointer;box-shadow:0 4px 14px rgba(15,148,136,.3);transition:filter .15s}
  button:hover{filter:brightness(1.05)} button:disabled{opacity:.6;cursor:default}
  #err{color:var(--red);font-size:12.5px;min-height:16px;margin-top:2px}
  .foot{color:#9aa3af;font-size:11px;margin-top:18px;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="icon.png" alt="FivePrayer" />
    <h1>FivePrayer · Team</h1>
    <p class="sub">Sign in to the org dashboard</p>
    <form id="f" autocomplete="on">
      <input id="u" name="username" placeholder="username" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <input id="p" name="password" type="password" placeholder="password" autocomplete="current-password" />
      <button id="btn" type="submit">Sign in</button>
      <div id="err"></div>
    </form>
    <div class="foot">Team-only · data is encrypted and unlocked by your password.</div>
  </div>
<script>
  var b2u = function(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); };
  if (sessionStorage.getItem('fpk')) location.replace('app.html');
  document.getElementById('f').addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = document.getElementById('btn'), err = document.getElementById('err');
    var u = document.getElementById('u').value.trim().toLowerCase(), p = document.getElementById('p').value;
    err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
    try{
      var auth = await (await fetch('auth.json?'+Date.now())).json();
      var rec = auth.users.find(function(x){ return x.username === u; });
      if (!rec) throw 0;
      var bk = await crypto.subtle.importKey('raw', new TextEncoder().encode(p), 'PBKDF2', false, ['deriveKey']);
      var uk = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:b2u(rec.salt), iterations:auth.iter||200000, hash:'SHA-256' }, bk, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      var dk = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(rec.iv) }, uk, b2u(rec.wrapped)); // throws on wrong password
      sessionStorage.setItem('fpk', btoa(String.fromCharCode.apply(null, new Uint8Array(dk))));
      sessionStorage.setItem('fpu', u);
      location.replace('app.html');
    } catch(_){
      err.textContent = 'Wrong username or password.';
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
